          options: [
            {
              title: "Right after we turned the AC back on",
              desc: "The symptoms started the same day or within a day of the first real cooling run.",
              points: 3
            },
            {
              title: "Around the same week the AC started running",
              desc: "I noticed it in that same general stretch, but not immediately.",
              points: 2
            },
            {
              title: "It built up gradually over spring",
              desc: "There was no obvious connection to the AC kicking on.",
              points: 1
            },
            {
              title: "It happens all year anyway",
              desc: "Spring did not change much for me.",
              points: 0
            }
          ]
        },
        {
          eyebrow: "Indoor vs. outdoor",
          title: "Where do you usually feel the flare-up the most?",
          help: "Pick the place where symptoms are most noticeable.",
          options: [
            {
              title: "Indoors, especially in the bedroom or living room",
              desc: "Those are the spots where the sneezing and stuffiness really hit.",
              points: 3

      function trackQuizEvent(name, meta) {
        if (typeof cvg === "function") {
          cvg({
            method: "track",
            eventName: name,
            meta: meta || {}
          });
        }
      }

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
          return parts.pop().split(";").shift();
        }
        return "";
      }

      function buildTrackedUrl(baseUrl) {
        const uid = getCookie("__cvg_uid");
        const sid = getCookie("__cvg_sid");
        let finalUrl = baseUrl;
        if (uid || sid) {
          finalUrl += finalUrl.includes("?") ? "&" : "?";
          if (uid) {
            finalUrl += `__cvg_uid=${encodeURIComponent(uid)}`;
          }
          if (uid && sid) {
            finalUrl += "&";
          }
          if (sid) {
            finalUrl += `__cvg_sid=${encodeURIComponent(sid)}`;
          }
        }
        return finalUrl;
      }

      function updateProgress() {
        const total = quizQuestions.length;
        const step = quizState.currentIndex + 1;
        const percent = Math.round((step / total) * 100);
        quizStepLabel.textContent = `Question ${step} of ${total}`;
        quizPercentLabel.textContent = `${percent}% complete`;
        quizProgressBar.style.width = `${percent}%`;
        quizBackButton.disabled = quizState.currentIndex === 0;
      }

      function renderQuestion() {
        const question = quizQuestions[quizState.currentIndex];
        if (!question) {
          return;

        updateProgress();
        quizEyebrow.textContent = question.eyebrow;
        quizTitle.textContent = question.title;
        quizHelp.textContent = question.help;

        quizOptions.innerHTML = question.options
          .map(function (option, index) {
            return `

                <span class="quiz-option__title">${option.title}</span>
                <span class="quiz-option__desc">${option.desc}</span>
              </button>
            `;
          })
          .join("");

        quizOptions.querySelectorAll(".quiz-option").forEach(function (button) {
          button.addEventListener("click", function () {
            const optionIndex = Number(button.getAttribute("data-option-index"));
            handleAnswer(optionIndex);
          });
        });
      }

      function handleAnswer(optionIndex) {
        const question = quizQuestions[quizState.currentIndex];
        const option = question.options[optionIndex];
        quizState.answers[quizState.currentIndex] = option.points;

        trackQuizEvent("CHH Quiz Answered", {
          questionNumber: quizState.currentIndex + 1,
          answerIndex: optionIndex,
          points: option.points
        });

        if (quizState.currentIndex === quizQuestions.length - 1) {
          showResults();
          return;
        }

        quizState.currentIndex += 1;
        renderQuestion();
      }

        const maxScore = quizQuestions.length * 3;
        const normalized = Math.max(0, Math.min(100, (totalScore / maxScore) * 100));

          return {
            percent: normalized,
            label: "Stronger indoor-air match",
            summary: "Your answers landed in the strongest range for AC-related indoor dust being part of the problem."

        if (normalized >= 45) {
          return {
            percent: normalized,
            label: "Mixed trigger pattern",
            summary: "Your answers point to a blended pattern where indoor airflow may be adding to seasonal symptoms."
          };
        }

        return {
          percent: normalized,
          label: "Lower indoor-air match",
          summary: "Your answers show a lighter AC signal, though indoor dust could still be one piece of the picture."
        };

      });

      const storedRecommendation = getStoredRecommendationState();
      if (storedRecommendation) {
        const restoredResult =
          quizResults.find(function (result) {
            return result.minScore === storedRecommendation.minScore;
          }) ||
          quizResults.find(function (result) {
            return storedRecommendation.score >= result.minScore;
          }) ||
          quizResults[0];
        enterRecommendationMode(restoredResult, storedRecommendation.score, false);
      } else {
        renderQuestion();
      }
    </script>
  </body>
</html>
